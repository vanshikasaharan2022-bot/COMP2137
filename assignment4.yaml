---
# Play 1: Configure target1 with apache2 and ufw
- name: Configure web server on target1
  hosts: target1-mgmt
  remote_user: remoteadmin
  become: yes
  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install apache2
      apt:
        name: apache2
        state: present

    - name: Ensure apache2 is running and enabled
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Install ufw
      apt:
        name: ufw
        state: present

    - name: Allow SSH through ufw (tcp only)
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP port 80 through ufw (tcp only)
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Enable ufw firewall
      ufw:
        state: enabled

# Play 2: Configure target2 with mysql and ufw
- name: Configure database server on target2
  hosts: target2-mgmt
  remote_user: remoteadmin
  become: yes
  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install mysql-server
      apt:
        name: mysql-server
        state: present

    - name: Ensure mysql is running and enabled
      service:
        name: mysql
        state: started
        enabled: yes

    - name: Install ufw
      apt:
        name: ufw
        state: present

    - name: Allow SSH through ufw (tcp only)
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow MySQL port 3306 through ufw (tcp only)
      ufw:
        rule: allow
        port: "3306"
        proto: tcp

    - name: Enable ufw firewall
      ufw:
        state: enabled
